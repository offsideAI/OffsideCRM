{% extends 'core/base.html' %}
{% load static %}
{% block content %}
{% load tailwind_filters %}
{{ form|crispy }}
{% load crispy_forms_tags %}
<div class="max-w-6xl mx-auto px-6 xl:px-0">
    <div>
      <div class="sm:hidden">
        <label for="tabs" class="sr-only">Select a tab</label>
        <!-- Use an "onChange" listener to redirect the user to the selected tab URL. -->
        <select id="tabs" name="tabs" class="block w-full rounded-md border-gray-300 focus:border-indigo-500 focus:ring-indigo-500">
          <option>Dashboard</option>
          <option>Company</option>
          <option selected>Team Members</option>
          <option>Billing</option>
        </select>
      </div>
      <div class="hidden sm:block">
        <nav class="flex space-x-4" aria-label="Tabs">
          <!-- Current: "bg-indigo-100 text-indigo-700", Default: "text-gray-500 hover:text-gray-700" -->
          <a href="{% url 'dashboard' %}" class="text-gray-500 hover:text-gray-700 rounded-md px-3 py-2 text-sm font-medium" aria-current="page">Dashboard</a>
          <a href="{% url 'fleet' %}" class="bg-indigo-100 text-indigo-700 rounded-md px-3 py-2 text-sm font-medium">Fleet</a>
          <a href="{% url 'routes' %}" class="text-gray-500 hover:text-gray-700 rounded-md px-3 py-2 text-sm font-medium">Routes</a>
          <a href="{% url 'stops' %}" class="text-gray-500 hover:text-gray-700 rounded-md px-3 py-2 text-sm font-medium" >Stops</a>
        </nav>
      </div>
    </div>
    {{ form|crispy }}
</div>
{% endblock %}
