{% extends 'core/base.html' %} {% load static %} {% block content %}
    <div class="max-w-6xl mx-auto px-6 xl:px-0">
    <header class="bg-gray-900 shadow-sm">
      <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
        <nav class="flex space-x-4" aria-label="Tabs">
          <!-- Current: "bg-indigo-100 text-indigo-700", Default: "text-gray-500 hover:text-gray-700" -->
          <a href="{% url 'dashboard' %}" class="bg-indigo-100 text-indigo-700 hover:text-gray-700 rounded-md px-3 py-2 text-sm font-medium" aria-current="page">Add Company</a>
          <a href="{% url 'fleet' %}" class="text-gray-500 hover:text-gray-700 rounded-md px-3 py-2 text-sm font-medium">Fleet</a>
          <a href="{% url 'routes' %}" class="text-gray-500 hover:text-gray-700 rounded-md px-3 py-2 text-sm font-medium">Routes</a>
          <a href="{% url 'stops' %}" class="text-gray-500 hover:text-gray-700 rounded-md px-3 py-2 text-sm font-medium" >Stops</a>
        </nav>
      </div>
    </header>
    <main>
      <div class="mx-auto max-w-7xl py-6 sm:px-6 lg:px-8">
        <form
          hx-post="{% url 'addcompany' %}"
          hx-target="#message"
        >
        {% csrf_token %}
          <div class="space-y-12">
            <div class="border-b border-white/10 pb-12">
              <h2 class="text-base font-semibold leading-7 text-white">
                Add Company
              </h2>
              <p class="mt-1 text-sm leading-6 text-gray-400">
                This is the name of the company you wish to add
              </p>

              <div
                class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6"
              >
                <div class="sm:col-span-4">
                  <label
                    for="name"
                    class="block text-sm font-medium leading-6 text-white"
                    >Name</label
                  >
                  <div class="mt-2">
                    <div
                      class="flex rounded-md bg-white/5 ring-1 ring-inset ring-white/10 focus-within:ring-2 focus-within:ring-inset focus-within:ring-azure-500"
                    >
                      <input
                        type="text"
                        name="name"
                        id="name"
                        px-3
                        autocomplete="name"
                        class="flex-1 rounded-md border-0 bg-transparent px-4 py-1.5 pl-1 text-white focus:ring-2 focus:ring-azure-500 sm:text-sm sm:leading-6"
                        placeholder="Company Name"
                      />
                    </div>
                  </div>
                </div>

                <!-- cell_phone -->
                <div class="sm:col-span-4">
                  <label
                    for="cellphone"
                    class="block text-sm font-medium leading-6 text-white"
                    >Cellphone</label
                  >
                  <div class="mt-2">
                    <div
                      class="flex rounded-md bg-white/5 ring-1 ring-inset ring-white/10 focus-within:ring-2 focus-within:ring-inset focus-within:ring-azure-500"
                    >
                      <input
                        type="text"
                        name="cellphone"
                        id="cellphone"
                        px-3
                        autocomplete="name"
                        class="flex-1 rounded-md border-0 bg-transparent px-4 py-1.5 pl-1 text-white focus:ring-2 focus:ring-azure-500 sm:text-sm sm:leading-6"
                        placeholder="Cell Phone"
                      />
                    </div>
                  </div>
                </div>

                <!-- work_phone -->
                <div class="sm:col-span-4">
                  <label
                    for="workphone"
                    class="block text-sm font-medium leading-6 text-white"
                    >Work phone</label
                  >
                  <div class="mt-2">
                    <div
                      class="flex rounded-md bg-white/5 ring-1 ring-inset ring-white/10 focus-within:ring-2 focus-within:ring-inset focus-within:ring-azure-500"
                    >
                      <input
                        type="text"
                        name="workphone"
                        id="workphone"
                        px-3
                        autocomplete="name"
                        class="flex-1 rounded-md border-0 bg-transparent px-4 py-1.5 pl-1 text-white focus:ring-2 focus:ring-azure-500 sm:text-sm sm:leading-6"
                        placeholder="Work Phone"
                      />
                    </div>
                  </div>
                </div>

                <!-- email -->
                <div class="sm:col-span-4">
                  <label
                    for="email"
                    class="block text-sm font-medium leading-6 text-white"
                    >Email</label
                  >
                  <div class="mt-2">
                    <div
                      class="flex rounded-md bg-white/5 ring-1 ring-inset ring-white/10 focus-within:ring-2 focus-within:ring-inset focus-within:ring-azure-500"
                    >
                      <input
                        type="text"
                        name="email"
                        id="email"
                        px-3
                        autocomplete="name"
                        class="flex-1 rounded-md border-0 bg-transparent px-4 py-1.5 pl-1 text-white focus:ring-2 focus:ring-azure-500 sm:text-sm sm:leading-6"
                        placeholder="Email"
                      />
                    </div>
                  </div>
                </div>

                <!-- website -->
                <div class="sm:col-span-4">
                  <label
                    for="website"
                    class="block text-sm font-medium leading-6 text-white"
                    >Website</label
                  >
                  <div class="mt-2">
                    <div
                      class="flex rounded-md bg-white/5 ring-1 ring-inset ring-white/10 focus-within:ring-2 focus-within:ring-inset focus-within:ring-azure-500"
                    >
                      <input
                        type="text"
                        name="website"
                        id="website"
                        px-3
                        autocomplete="name"
                        class="flex-1 rounded-md border-0 bg-transparent px-4 py-1.5 pl-1 text-white focus:ring-2 focus:ring-azure-500 sm:text-sm sm:leading-6"
                        placeholder="Website"
                      />
                    </div>
                  </div>
                </div>

                <div class="col-span-full">
                  <label
                    for="about"
                    class="block text-sm font-medium leading-6 text-white"
                    >Description</label
                  >
                  <div class="mt-2">
                    <textarea
                      id="desc"
                      name="desc"
                      rows="3"
                      class="block w-full rounded-md border-0 bg-white/5 py-1.5 text-white shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-azure-500 sm:text-sm sm:leading-6"
                    ></textarea>
                  </div>
                  <p class="mt-3 text-sm leading-6 text-gray-400">
                    Write a company description
                  </p>
                </div>

                <!-- isfeatured -->
                <div class="col-span-full">
                  <label
                    for="isfeatured"
                    class="block text-sm font-medium leading-6 text-white"
                    >Is Featured</label
                  >

                  <div class="flex h-6 items-center">
                    <input
                      id="isfeatured"
                      name="isfeatured"
                      type="checkbox"
                      class="h-4 w-4 rounded border-white/10 bg-white/5 text-azure-600 focus:ring-azure-600 focus:ring-offset-gray-900"
                    />
                  </div>
                </div>

                <!-- isPrivateLabel -->
                <div class="col-span-full">
                  <label
                    for="isfeatured"
                    class="block text-sm font-medium leading-6 text-white"
                    >Is Private Label</label
                  >

                  <div class="flex h-6 items-center">
                    <input
                      id="isprivatelabel"
                      name="isprivatelabel"
                      type="checkbox"
                      class="h-4 w-4 rounded border-white/10 bg-white/5 text-azure-600 focus:ring-azure-600 focus:ring-offset-gray-900"
                    />
                  </div>
                </div>

                <!-- isActive -->
                <div class="col-span-full">
                  <label
                    for="isfeatured"
                    class="block text-sm font-medium leading-6 text-white"
                    >Is Active</label
                  >

                  <div class="flex h-6 items-center">
                    <input
                      id="isactive"
                      name="isactive"
                      type="checkbox"
                      class="h-4 w-4 rounded border-white/10 bg-white/5 text-azure-600 focus:ring-azure-600 focus:ring-offset-gray-900"
                    />
                  </div>
                </div>

                <div class="col-span-full">
                  <label
                    for="cover-photo"
                    class="block text-sm font-medium leading-6 text-white"
                    >Cover photo</label
                  >
                  <div
                    class="mt-2 flex justify-center rounded-lg border border-dashed border-white/25 px-6 py-10"
                  >
                    <div class="text-center">
                      <svg
                        class="mx-auto h-12 w-12 text-gray-500"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                        aria-hidden="true"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M1.5 6a2.25 2.25 0 012.25-2.25h16.5A2.25 2.25 0 0122.5 6v12a2.25 2.25 0 01-2.25 2.25H3.75A2.25 2.25 0 011.5 18V6zM3 16.06V18c0 .414.336.75.75.75h16.5A.75.75 0 0021 18v-1.94l-2.69-2.689a1.5 1.5 0 00-2.12 0l-.88.879.97.97a.75.75 0 11-1.06 1.06l-5.16-5.159a1.5 1.5 0 00-2.12 0L3 16.061zm10.125-7.81a1.125 1.125 0 112.25 0 1.125 1.125 0 01-2.25 0z"
                          clip-rule="evenodd"
                        />
                      </svg>
                      <div class="mt-4 flex text-sm leading-6 text-gray-400">
                        <label
                          for="file-upload"
                          class="relative cursor-pointer rounded-md bg-gray-900 font-semibold text-white focus-within:outline-none focus-within:ring-2 focus-within:ring-azure-600 focus-within:ring-offset-2 focus-within:ring-offset-gray-900 hover:text-azure-500"
                        >
                          <span>Upload an image </span>
                          <input
                            id="image"
                            name="image"
                            type="file"
                            class="sr-only"
                          />
                        </label>
                        <p class="pl-1">or drag and drop</p>
                      </div>
                      <p class="text-xs leading-5 text-gray-400">
                        PNG, JPG, GIF up to 10MB
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- Submit and Cancel Buttons -->
          <div class="mt-6 flex items-center justify-end gap-x-6">
            <button type="button" class="btn btn-outline btn-warning">
              Cancel
            </button>
            <input type="submit" value="Submit" class="btn btn-outline btn-success">
          </div>
        </form>
        <div id="message"></div>
      </div>
    </main>
  </div>
{% endblock %}
