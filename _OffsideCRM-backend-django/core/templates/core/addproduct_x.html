{% extends 'core/base.html' %}
{% load static %}
{% block content %}
<div class="relative isolate overflow-hidden bg-gray-900 py-24 sm:py-32 text-center">
    <img src="{% static 'background_3.jpg' %}" alt="" class="absolute inset-0 -z-10 h-full w-full object-cover object-right md:object-center">
    <p class="mb-2 text-3xl lg:text-5xl text-white"></p>

    <p class="mb-10 text-white py-5"></p>
    {% if user.is_authenticated %}

    <div class="max-w-6xl mx-auto flex flex-wrap items-start py-6 px-4 xl:px-8 bg-gray-800 rounded-lg shadow-lg">
        <div class="w-full lg:w-1/3 bg-gray-700 p-6 rounded-lg">
            <h1 class="text-2xl font-semibold text-white mb-4">Add Product</h1>
            <div class="form-group">
                <form method="POST" enctype="multipart/form-data" class="flex flex-col gap-4">
                    {% csrf_token %}
                    {{ form.media }}
                    <div class="form-fields space-y-2">
                        {{ form.as_p | safe }}
                    </div>
                    <button class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-300">
                        Post
                    </button>
                </form>
            </div>
        </div>
    </div>

    {% endif %}
</div>
{% endblock %}
