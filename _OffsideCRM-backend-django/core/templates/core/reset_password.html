{% extends 'core/base.html' %}

{% load static %}
{% block content %}
<div class="relative isolate overflow-hidden bg-gray-900 py-24 sm:py-32 text-center">
    <img src="{% static 'background_3.jpg' %}" alt="" class="absolute inset-0 -z-10 h-full w-full object-cover object-right md:object-center">
    <div class="max-w-lg mx-auto flex flex-wrap p-6">
        <div class="w-full bg-gray-800 p-6 rounded-xl">
            <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
                <div class="sm:mx-auto sm:w-full sm:max-w-sm">
                  <a class="mx-auto h-10 w-auto" href="/" alt="UderzoAI">
                  <svg class="mx-auto h-10 w-auto" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
                  </svg>
                  </a>
                  <h2 class="mt-10 text-center text-2xl font-bold leading-9 tracking-tight text-white">Reset Password</h2>
                </div>
                
                <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
                    {% if submitted %}
                        Submitted successfully
                    {% else %}
                    <form action="" method="POST">
                        {% csrf_token %}
                        <div>
                            <label for="email" class="block text-sm font-medium leading-6 text-white"></label>
                            <div class="mt-2">
                              <input name="new_password" type="password" required 
                              class="block 
                              w-full 
                              rounded-md 
                              border-0 
                              bg-white/5
                              px-3
                              py-1.5 
                              text-white 
                              shadow-sm 
                              ring-1 
                              ring-inset 
                              ring-white/10 
                              focus:ring-2 
                              focus:ring-inset 
                              focus:ring-indigo-500 
                              sm:text-sm 
                              sm:leading-6"
                              >
                            </div>
                          </div>
                    
                          <div>
                            <div class="flex items-center justify-between">
                              <label for="password" class="block text-sm font-medium leading-6 text-white">New Password</label>
                              <div class="text-sm">
                                <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">Forgot password?</a>
                              </div>
                            </div>
                            <div class="mt-2">
                              <input name="new_password" type="password"  required 
                              class="block 
                              w-full 
                              rounded-md 
                              border-0 
                              bg-white/5
                              px-3 
                              py-1.5 
                              text-white 
                              shadow-sm 
                              ring-1 
                              ring-inset 
                              ring-white/10 
                              focus:ring-2 
                              focus:ring-inset 
                              focus:ring-indigo-500 
                              sm:text-sm 
                              sm:leading-6"
                              >
                            </div>
                          </div>
                    
                          <div class="mt-4">
                            <input type="submit" value="Submit" class="flex w-full justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-indigo-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">
                          </div>
                        {{ form.as_p }}

                    </form>
                    {% endif %}    
                    <p class="mt-10 text-center text-sm text-gray-400">
                    Not a member?
                    <a href="{% url 'register' %}" class="font-semibold leading-6 text-indigo-400 hover:text-indigo-300">Register here</a>
                    </p>
                </div>
            </div>
            
            </div>
        </div>
</div>

{% endblock %}
